<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Stealth Bot | Project Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --card: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); padding: 120px 8% 0 8%; line-height: 1.6; transition: background 0.5s; min-height: 100vh; display: flex; flex-direction: column; }

        /* Навігація — СИНХРОНІЗОВАНО З ALL-PROJECTS */
        .nav-header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px 8%; background: rgba(var(--bg), 0.8);
            backdrop-filter: blur(20px); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }

        .back-link { 
            color: var(--text); text-decoration: none; font-weight: 800; 
            font-family: var(--font-hd); font-size: 0.8rem;
            display: flex; align-items: center; gap: 10px;
            transition: var(--transition);
            text-transform: uppercase;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }
        .back-link:active { transform: scale(0.95) translateX(-5px); }

        .control-btn { 
            background: none; border: 1px solid var(--border); color: var(--text); 
            padding: 8px 15px; border-radius: 50px; cursor: pointer; 
            font-family: var(--font-hd); font-size: 0.6rem; transition: 0.3s;
        }
        .control-btn:hover { background: var(--text); color: var(--bg); }

        .hero-project { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; min-height: 60vh; flex-grow: 1; }
        .project-info h1 { font-family: var(--font-hd); font-size: clamp(2rem, 5vw, 4rem); margin-bottom: 20px; text-transform: uppercase; }
        .project-meta { display: flex; gap: 20px; margin-bottom: 30px; }
        .meta-item { font-size: 0.8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }

        .project-visual { background: var(--card); border: 1px solid var(--border); border-radius: 40px; height: 100%; min-height: 400px; display: flex; align-items: center; justify-content: center; }

        .project-content { max-width: 800px; margin-top: 80px; }
        .project-content h2 { font-family: var(--font-hd); margin-bottom: 30px; font-size: 1.5rem; }
        .project-content p { color: var(--text-secondary); margin-bottom: 20px; font-size: 1.1rem; }

        footer { padding: 80px 0 40px 0; border-top: 1px solid var(--border); margin-top: 100px; display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.8rem; font-weight: 600; }

        @media (max-width: 900px) { .hero-project { grid-template-columns: 1fr; } .nav-header { padding: 20px 5%; } }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="../all-projects.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> <span class="lang-en">BACK TO ARCHIVE</span><span class="lang-ua" style="display:none;">ДО АРХІВУ</span>
        </a>
        <div style="display: flex; gap: 15px;">
            <button class="control-btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <button class="control-btn" onclick="toggleLang()">UA / EN</button>
        </div>
    </header>

    <section class="hero-project">
        <div class="project-info">
            <div class="project-meta">
                <span class="meta-item">Automation</span>
                <span class="meta-item">2026</span>
            </div>
            <h1>TikTok Stealth Bot</h1>
            <p style="color: var(--text-secondary); font-size: 1.2rem;">A sophisticated automation tool designed to mimic human behavior.</p>
        </div>
        <div class="project-visual">
            <i class="fa-solid fa-robot" style="font-size: 10rem; opacity: 0.2;"></i>
        </div>
    </section>

    <div class="project-content">
        <h2 class="lang-en">Logic</h2><h2 class="lang-ua" style="display:none;">Логіка</h2>
        <p>This project uses advanced browser fingerprinting logic.</p>
    </div>

    <footer>
        <div>© 2026 MAKSYM RIZUN</div>
        <div>VERSAILLE ANOR ARCHITECTURE</div>
    </footer>

    <script>
        function toggleTheme() { document.body.classList.toggle('light-theme'); }
        function toggleLang() {
            const ens = document.querySelectorAll('.lang-en');
            const uas = document.querySelectorAll('.lang-ua');
            ens.forEach(el => el.style.display = el.style.display === 'none' ? 'block' : 'none');
            uas.forEach(el => el.style.display = el.style.display === 'none' ? 'block' : 'none');
        }
    </script>
</body>
</html>
