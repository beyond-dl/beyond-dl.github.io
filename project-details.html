<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Archive of Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --border: rgba(255, 255, 255, 0.1);
            --card: rgba(255, 255, 255, 0.05);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --card: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); 
            padding-top: 100px;
            transition: background 0.5s; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header за дизайном --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 8%;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .nav-left { display: flex; align-items: center; gap: 30px; }

        .back-link { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 800; 
            font-family: var(--font-hd); 
            font-size: 0.8rem;
            display: flex; 
            align-items: center; 
            gap: 10px;
            transition: var(--transition);
            text-transform: uppercase;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }

        .nav-controls { display: flex; gap: 15px; align-items: center; }

        .control-btn { 
            background: none; 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 8px 15px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-family: var(--font-hd); 
            font-size: 0.6rem; 
            transition: 0.3s;
        }
        .control-btn:hover { background: var(--text); color: var(--bg); }
        .control-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .project-container { max-width: 1200px; margin: 0 auto; padding: 40px 8% 0; }

        .project-meta { 
            color: var(--accent); 
            font-family: var(--font-hd); 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        h1 { 
            font-family: var(--font-hd); 
            font-size: clamp(2rem, 5vw, 4rem); 
            line-height: 1.1; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
        }

        .hero-img-box {
            width: 100%;
            height: auto;
            max-height: 84vh;
            border-radius: 30px;
            margin-bottom: 60px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .hero-img { 
            width: 100%; 
            height: 100%;
            display: block;
            object-fit: cover;
            transition: var(--transition);
        }

        .project-grid { display: grid; grid-template-columns: 300px 1fr; gap: 80px; }

        .sidebar h3 { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            color: var(--text-secondary); 
            margin-bottom: 15px; 
            font-family: var(--font-hd);
            letter-spacing: 1px;
        }

        .sidebar .info-block { margin-bottom: 45px; }
        .sidebar p, .sidebar a { font-weight: 600; font-size: 1rem; color: var(--text); text-decoration: none; }
        
        .tech-tag {
            display: inline-block;
            padding: 6px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.75rem !important;
            margin: 0 5px 5px 0;
            transition: 0.3s;
            color: var(--text);
            text-transform: uppercase;
            font-family: var(--font-hd);
            text-decoration: none;
        }
        .tech-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 113, 227, 0.05);
        }

        /* --- Інноваційна система лайкінгу --- */
        .rating-system {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        .like-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-hd);
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .like-btn:hover { border-color: #ff3b30; color: #ff3b30; }
        .like-btn.voted { background: #ff3b30; border-color: #ff3b30; color: white; box-shadow: 0 0 20px rgba(255, 59, 48, 0.4); }
        .like-btn i { font-size: 1rem; }

        .main-content { 
            font-size: 1.1rem; 
            line-height: 1.8; 
            color: var(--text-secondary); 
            white-space: pre-wrap; 
        }

        .gallery { margin-top: 80px; display: grid; gap: 30px; }
        .gallery img { width: 100%; border-radius: 20px; border: 1px solid var(--border); }

        .cooperation-banner {
            max-width: 1200px;
            margin: 120px auto 0;
            padding: 60px 8%;
            background: var(--card);
            border-radius: 40px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .cooperation-banner p { font-size: 1.2rem; color: var(--text-secondary); line-height: 1.5; }
        .brief-trigger { color: var(--accent); cursor: pointer; font-weight: 800; text-decoration: underline; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: var(--bg); width: 90%; max-width: 600px; padding: 40px;
            border-radius: 30px; border: 1px solid var(--border); position: relative;
        }
        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; }

        /* --- Оновлений Футер за дизайном (1 в 1) --- */
        footer { 
            padding: 80px 8%; 
            border-top: 1px solid var(--border); 
            margin-top: 100px;
            background: var(--bg);
        }
        .footer-grid { display: flex; justify-content: space-between; align-items: center; }
        
        .footer-contacts a { 
            display: block; 
            font-family: var(--font-hd); 
            font-size: 2.5rem; 
            font-weight: 900;
            color: var(--text); 
            text-decoration: none; 
            margin-bottom: 5px; 
            letter-spacing: -1px;
        }
        .footer-contacts .email-link { font-size: 2.5rem; margin-top: 5px; }

        .footer-right { text-align: right; }
        .footer-name { font-family: var(--font-hd); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        .footer-role { color: var(--text-secondary); font-family: var(--font-main); font-size: 0.9rem; margin-top: 5px; }
        .copyright { font-size: 0.7rem; color: var(--text-secondary); margin-top: 15px; opacity: 0.5; }

        .social-links { display: flex; gap: 15px; margin-top: 30px; }
        .social-btn { 
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; color: var(--text); 
            text-decoration: none; transition: var(--transition); font-size: 1rem;
            background: rgba(255,255,255,0.03);
        }
        .social-btn:hover { background: var(--text); color: var(--bg); transform: translateY(-3px); }

        @media (max-width: 900px) {
            .project-grid { grid-template-columns: 1fr; gap: 40px; }
            .footer-grid { flex-direction: column; align-items: flex-start; gap: 50px; }
            .footer-right { text-align: left; }
            .footer-contacts a { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <a href="all-projects.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> 
                <span class="lang-en">BACK TO ARCHIVE</span>
                <span class="lang-ua" style="display:none;">ДО АРХІВУ</span>
            </a>
        </div>
        <div class="nav-controls">
            <button class="control-btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <button class="control-btn" onclick="setLang('ua')" id="btn-ua">UA</button>
            <button class="control-btn" onclick="setLang('en')" id="btn-en">EN</button>
        </div>
    </header>

    <main class="project-container" id="project-render"></main>

    <section class="cooperation-banner">
        <p class="lang-ua">Маєш ідею для проекта та бажання втілити її в життя? <span class="brief-trigger" onclick="openBrief()">Заповнюй бриф</span>, все інше беру на себе.</p>
        <p class="lang-en" style="display:none;">Have an idea for a project and want to bring it to life? <span class="brief-trigger" onclick="openBrief()">Fill the brief</span>, and I’ll take care of the rest.</p>
    </section>

    <footer>
        <div class="footer-grid">
            <div class="footer-left">
                <div class="footer-contacts" id="f-contacts">
                    </div>
                <div class="social-links" id="f-socials">
                    </div>
            </div>
            <div class="footer-right">
                <div class="footer-name">MAKSYM RIZUN</div>
                <div id="f-role" class="footer-role"></div>
                <div class="copyright">© All Rights Reserved.</div>
            </div>
        </div>
    </footer>

    <div class="modal-overlay" id="briefModal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeBrief()"></i>
            <h2 style="font-family: var(--font-hd); margin-bottom: 20px;">PROJECT BRIEF</h2>
            <form id="briefForm">
                <input type="text" placeholder="Your Name" style="width: 100%; padding: 15px; margin-bottom: 10px; background: var(--card); border: 1px solid var(--border); color: white;">
                <input type="email" placeholder="Email" style="width: 100%; padding: 15px; margin-bottom: 10px; background: var(--card); border: 1px solid var(--border); color: white;">
                <textarea placeholder="Project Details" style="width: 100%; padding: 15px; height: 150px; background: var(--card); border: 1px solid var(--border); color: white;"></textarea>
                <button type="submit" style="width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-family: var(--font-hd); cursor: pointer; margin-top: 10px;">SEND TO ARCHIVE</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        let currentLang = localStorage.getItem('anor_lang') || 'ua';

        window.toggleTheme = () => {
            const isLight = document.body.classList.toggle('light-theme');
            localStorage.setItem('anor_theme', isLight ? 'light' : 'dark');
        };
        if(localStorage.getItem('anor_theme') === 'light') document.body.classList.add('light-theme');

        window.setLang = (lang) => {
            currentLang = lang;
            localStorage.setItem('anor_lang', lang);
            updateUI();
            if(window.lastData) renderProject(window.lastData);
        };

        window.openBrief = () => document.getElementById('briefModal').style.display = 'flex';
        window.closeBrief = () => document.getElementById('briefModal').style.display = 'none';

        // Система "Енергетичного Резонансу" (Лайкінг)
        window.voteProject = () => {
            if (!projectId) return;
            const voteRef = ref(db, `projects/${projectId}/likes`);
            const hasVoted = localStorage.getItem(`voted_${projectId}`);

            if (hasVoted) return;

            runTransaction(voteRef, (currentLikes) => {
                return (currentLikes || 0) + 1;
            }).then(() => {
                localStorage.setItem(`voted_${projectId}`, 'true');
                const btn = document.getElementById('like-btn-action');
                if(btn) btn.classList.add('voted');
            });
        };

        function updateUI() {
            document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + currentLang)?.classList.add('active');
            document.querySelectorAll('.lang-en').forEach(el => el.style.display = currentLang === 'en' ? 'inline-block' : 'none');
            document.querySelectorAll('.lang-ua').forEach(el => el.style.display = currentLang === 'ua' ? 'inline-block' : 'none');
            if(window.lastFooter) {
                document.getElementById('f-role').innerText = currentLang === 'ua' ? window.lastFooter.roleUa : window.lastFooter.roleEn;
            }
        }

        function renderProject(data) {
            window.lastData = data;
            const container = document.getElementById('project-render');
            
            const splitText = (txt) => (txt && txt.includes(' / ')) ? txt.split(' / ') : [txt, txt];
            
            const titleArr = splitText(data.title);
            const descArr = splitText(data.description);
            
            const title = currentLang === 'ua' ? titleArr[0] : (titleArr[1] || titleArr[0]);
            const desc = currentLang === 'ua' ? descArr[0] : (descArr[1] || descArr[0]);
            
            const meta = data.customMeta || (currentLang === 'ua' ? 'АРТЕФАКТ' : 'ARTIFACT');
            
            let tags = [];
            if (data.categories && Array.isArray(data.categories)) {
                tags = data.categories;
            } else if (data.category) {
                tags = typeof data.category === 'string' ? data.category.split(',').map(t => t.trim()) : [];
            }

            const votedClass = localStorage.getItem(`voted_${projectId}`) ? 'voted' : '';

            container.innerHTML = `
                <div class="project-meta">${meta}</div>
                <h1>${title}</h1>
                <div class="hero-img-box">
                    <img src="${data.mainImage}" class="hero-img" alt="${title}">
                </div>
                <div class="project-grid">
                    <div class="sidebar">
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'ДЕВЕЛОПЕР' : 'DEVELOPER'}</h3>
                            <p>Maksym Rizun</p>
                        </div>
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'КАТЕГОРІЇ' : 'CATEGORIES'}</h3>
                            <div>${tags.map(t => `<a href="all-projects.html?category=${encodeURIComponent(t)}" class="tech-tag">${t}</a>`).join('')}</div>
                        </div>
                        <div class="info-block">
                            <h3>${currentLang === 'ua' ? 'ОЦІНИ ПРОЕКТ' : 'RATE PROJECT'}</h3>
                            <div class="rating-system">
                                <button class="like-btn ${votedClass}" id="like-btn-action" onclick="voteProject()">
                                    <i class="fa-solid fa-bolt"></i> <span id="like-count">${data.likes || 0}</span>
                                </button>
                            </div>
                        </div>
                        ${data.githubLink ? `
                        <div class="info-block">
                            <h3>GITHUB</h3>
                            <a href="${data.githubLink}" target="_blank" style="color: var(--accent); font-weight: 800;">OPEN SOURCE <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                        </div>` : ''}
                    </div>
                    <div class="main-content">${desc}</div>
                </div>
                ${(data.gallery && Array.isArray(data.gallery)) ? `
                    <div class="gallery">
                        ${data.gallery.filter(img => img.trim() !== "").map(img => `<img src="${img}">`).join('')}
                    </div>
                ` : ''}
            `;
        }

        // Отримання даних проекту
        if (projectId) {
            onValue(ref(db, `projects/${projectId}`), (snap) => {
                const data = snap.val();
                if (data) renderProject(data);
            });
        }

        // ЄДИНИЙ ФУТЕР - завантаження з БД
        onValue(ref(db, 'settings/footer'), (snapshot) => {
            const f = snapshot.val();
            if(!f) return;
            window.lastFooter = f;
            
            // Оновлюємо контакти
            document.getElementById('f-contacts').innerHTML = `
                <a href="tel:${f.phone || ''}">${f.phone || '+380 00 000 00 00'}</a>
                <a href="mailto:${f.email || ''}" class="email-link">${f.email || 'mail@example.com'}</a>
            `;

            // Оновлюємо соціальні мережі
            document.getElementById('f-socials').innerHTML = `
                <a href="${f.wa || '#'}" target="_blank" class="social-btn"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="${f.tg || '#'}" target="_blank" class="social-btn"><i class="fa-brands fa-telegram"></i></a>
                <a href="${f.gh || '#'}" target="_blank" class="social-btn"><i class="fa-brands fa-github"></i></a>
                <a href="${f.ds || '#'}" target="_blank" class="social-btn"><i class="fa-brands fa-discord"></i></a>
                <a href="${f.be || '#'}" target="_blank" class="social-btn"><i class="fa-brands fa-behance"></i></a>
                <a href="${f.fn || '#'}" target="_blank" class="social-btn" style="font-family: 'Unbounded', sans-serif; font-weight: 900;">F</a>
            `;
            updateUI();
        });
    </script>
</body>
</html>
