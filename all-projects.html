<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Maksym Rizun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="translator.js"></script>
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --border: rgba(255, 255, 255, 0.1);
            --card: rgba(255, 255, 255, 0.05);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: rgba(0, 0, 0, 0.08);
            --card: rgba(0, 0, 0, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); overflow-x: hidden; transition: background 0.5s; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 25px 8%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .logo { font-family: var(--font-hd); font-size: 1.2rem; font-weight: 900; cursor: pointer; }

        .project-hero { width: 100%; height: 70vh; position: relative; overflow: hidden; }
        #hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg)); }

        .container { padding: 60px 8%; max-width: 1400px; margin: 0 auto; }
        .project-header { margin-top: -120px; position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: flex-end; }
        .project-title { font-family: var(--font-hd); font-size: clamp(2rem, 5vw, 4.5rem); text-transform: uppercase; font-weight: 900; }
        
        .like-container { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 15px 25px; border-radius: 100px; border: 1px solid var(--border); }
        .like-btn { cursor: pointer; font-size: 1.5rem; transition: 0.3s; color: var(--text-secondary); }
        .like-btn.active { color: #ff3b30; transform: scale(1.2); }
        .like-count { font-family: var(--font-hd); font-weight: 800; font-size: 1.2rem; }

        .project-content { display: grid; grid-template-columns: 2fr 1fr; gap: 80px; margin-top: 60px; }
        .description { font-size: 1.2rem; line-height: 1.8; color: var(--text-secondary); }
        .meta-info { display: flex; flex-direction: column; gap: 30px; }
        .meta-box h4 { font-family: var(--font-hd); font-size: 0.8rem; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
        .meta-box p { font-size: 1.1rem; font-weight: 600; }

        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 60px; }
        .gallery img { width: 100%; border-radius: 30px; border: 1px solid var(--border); }

        footer { padding: 100px 8%; border-top: 1px solid var(--border); margin-top: 100px; }
        .footer-grid { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 40px; }
        .social-icons { display: flex; gap: 12px; }
        .social-icons a { width: 50px; height: 50px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: var(--text); border: 1px solid var(--border); transition: 0.3s; }

        .lang-ua { display: none; }
        body.ua .lang-en { display: none; }
        body.ua .lang-ua { display: block; }
    </style>
</head>
<body data-theme="dark">

    <nav>
        <div class="logo" onclick="window.location.href='index.html'">MAKSYM RIZUN</div>
        <div class="controls" style="display:flex; gap:20px;">
            <div class="lang-switch" style="cursor:pointer; color:var(--accent); font-weight:800;">
                <span class="lang-en" onclick="document.body.classList.toggle('ua'); VersalTranslator.setLanguage('uk')">UKRAINIAN</span>
                <span class="lang-ua" onclick="document.body.classList.toggle('ua'); VersalTranslator.setLanguage('en')">ENGLISH</span>
            </div>
            <div onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='light'?'dark':'light')" style="cursor:pointer;">🌓</div>
        </div>
    </nav>

    <div class="project-hero">
        <img src="" id="hero-img" alt="Hero">
        <div class="hero-overlay"></div>
    </div>

    <div class="container">
        <div class="project-header">
            <h1 class="project-title" id="p-title">PROJECT</h1>
            <div class="like-container">
                <i class="fa-solid fa-heart like-btn" id="likeBtn"></i>
                <span class="like-count" id="likeCount">0</span>
            </div>
        </div>

        <div class="project-content">
            <div class="description" id="p-desc">
                </div>
            <div class="meta-info">
                <div class="meta-box">
                    <h4 class="lang-en">Category</h4>
                    <h4 class="lang-ua">Категорія</h4>
                    <p id="p-cat">Digital Art</p>
                </div>
                <div class="meta-box">
                    <h4 class="lang-en">Release Date</h4>
                    <h4 class="lang-ua">Дата релізу</h4>
                    <p id="p-date">2024</p>
                </div>
            </div>
        </div>

        <div class="gallery" id="p-gallery">
            </div>
    </div>

    <footer>
        <div class="footer-grid">
            <div class="footer-contacts">
                <a href="mailto:Destro729@gmail.com" style="color:var(--text); text-decoration:none; font-family:var(--font-hd); font-weight:900;" id="f-email">Destro729@gmail.com</a>
                <div class="social-icons" id="f-socials"></div>
            </div>
            <div>
                <p style="font-family:var(--font-hd); font-weight:800;" id="f-role">DESIGNER & AI ENGINEER</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwQpDnT4_o1fiVDKuWI7VAYeal9nh6dRQ",
            authDomain: "anor-core-2026.firebaseapp.com",
            databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "anor-core-2026",
            storageBucket: "anor-core-2026.firebasestorage.app",
            messagingSenderId: "787691904559",
            appId: "1:787691904559:web:845da19d72ceb9ec50b0da"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (projectId) {
            onValue(ref(db, `projects/${projectId}`), (snap) => {
                const p = snap.val();
                if (p) {
                    document.getElementById('hero-img').src = p.mainImage || 'img/default.jpg';
                    document.getElementById('p-title').innerText = p.title || 'Untitled';
                    document.getElementById('p-desc').innerText = p.desc || '';
                    document.getElementById('p-cat').innerText = p.category || 'Project';
                    document.getElementById('p-date').innerText = p.date || '2026';
                    document.getElementById('likeCount').innerText = p.likes || 0;

                    // Gallery
                    const gallery = document.getElementById('p-gallery');
                    gallery.innerHTML = "";
                    if (p.images) {
                        Object.values(p.images).forEach(url => {
                            const img = document.createElement('img');
                            img.src = url;
                            gallery.appendChild(img);
                        });
                    }

                    // Like logic
                    const likeBtn = document.getElementById('likeBtn');
                    const hasLiked = localStorage.getItem(`liked_${projectId}`);
                    if (hasLiked) likeBtn.classList.add('active');

                    likeBtn.onclick = () => {
                        const isLiked = likeBtn.classList.contains('active');
                        runTransaction(ref(db, `projects/${projectId}/likes`), (currentLikes) => {
                            if (isLiked) {
                                return (currentLikes || 1) - 1;
                            } else {
                                return (currentLikes || 0) + 1;
                            }
                        }).then(() => {
                            if (isLiked) {
                                likeBtn.classList.remove('active');
                                localStorage.removeItem(`liked_${projectId}`);
                            } else {
                                likeBtn.classList.add('active');
                                localStorage.setItem(`liked_${projectId}`, 'true');
                            }
                        });
                    };
                }
            });
        }

        // Footer Settings
        onValue(ref(db, 'settings/footer'), (snap) => {
            const f = snap.val();
            if (f) {
                document.getElementById('f-email').innerText = f.email;
                document.getElementById('f-socials').innerHTML = `
                    <a href="${f.tg || '#'}"><i class="fa-brands fa-telegram"></i></a>
                    <a href="${f.wa || '#'}"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="${f.gh || '#'}"><i class="fa-brands fa-github"></i></a>
                `;
            }
        });
    </script>
</body>
</html>
