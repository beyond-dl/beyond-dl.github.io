<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive of Logic | Maksym Rizun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --accent-hover: #005bbd;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --card: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); padding: 120px 8% 0 8%; transition: background 0.5s; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        .nav-header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px 8%; background: var(--bg);
            backdrop-filter: blur(20px); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .nav-controls { display: flex; gap: 20px; align-items: center; }

        .back-link { 
            color: var(--text); text-decoration: none; font-weight: 800; 
            font-family: var(--font-hd); font-size: 0.8rem;
            display: flex; align-items: center; gap: 10px;
            transition: var(--transition);
            text-transform: uppercase;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }

        .control-btn { 
            background: none; border: 1px solid var(--border); color: var(--text); 
            padding: 8px 15px; border-radius: 50px; cursor: pointer; 
            font-family: var(--font-hd); font-size: 0.6rem; transition: 0.3s;
            min-width: 40px;
        }
        .control-btn:hover { background: var(--text); color: var(--bg); }

        h1 { font-family: var(--font-hd); font-size: clamp(2.5rem, 8vw, 5rem); margin: 40px 0; text-transform: uppercase; line-height: 1.1; }

        .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 60px; min-height: 50px; }
        .filter-btn { 
            padding: 14px 28px; border-radius: 100px; border: 1px solid var(--border); 
            background: transparent; color: var(--text-secondary); cursor: pointer; 
            font-weight: 600; text-transform: uppercase; transition: var(--transition);
            font-size: 0.75rem; letter-spacing: 1px;
            font-family: var(--font-hd);
        }
        .filter-btn:hover { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.05); }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 40px; flex-grow: 1; }
        
        .project-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 40px; 
            overflow: hidden; transition: var(--transition); display: flex; flex-direction: column;
            animation: fadeIn 0.6s ease forwards;
            cursor: pointer;
            position: relative;
            text-decoration: none;
            color: inherit;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .project-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .project-img { height: 260px; width: 100%; background: #111; overflow: hidden; background-size: cover !important; background-position: center !important; }
        .project-content { padding: 40px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .project-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .tag { font-size: 0.65rem; padding: 6px 14px; background: var(--accent); color: #fff; border-radius: 50px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .project-meta { font-family: var(--font-hd); font-size: 0.65rem; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
        .project-title { font-family: var(--font-hd); font-size: 1.4rem; margin: 10px 0 15px 0; font-weight: 900; }
        .project-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 25px; min-height: 50px; line-height: 1.6; }

        .project-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; margin-top: auto; }
        .like-btn { cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 800; transition: 0.2s; color: var(--text-secondary); position: relative; z-index: 10; }
        .like-btn:hover { color: var(--text); transform: scale(1.05); }
        .like-btn.liked { color: #ff3b30; }

        footer { padding: 100px 8%; border-top: 1px solid var(--border); margin-top: 100px; margin-left: -8.7%; margin-right: -8.7%; background: var(--bg); }
        .footer-grid { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-contacts { display: flex; flex-direction: column; gap: 10px; }
        .footer-contacts a { font-family: var(--font-hd); font-size: clamp(1.2rem, 3vw, 2rem); color: var(--text); text-decoration: none; font-weight: 900; transition: var(--transition); }
        .footer-contacts a:hover { color: var(--accent); }
        .footer-email { color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 1.1rem; }
        
        .social-icons { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .social-icons a { width: 50px; height: 50px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: var(--text); border: 1px solid var(--border); transition: 0.3s; text-decoration: none; }
        .social-icons a:hover { background: var(--accent); color: #fff; transform: translateY(-5px); border-color: var(--accent); }

        @media (max-width: 900px) { 
            .projects-grid { grid-template-columns: 1fr; } 
            .footer-grid { flex-direction: column; text-align: center; align-items: center; }
            .social-icons { justify-content: center; }
        }
    </style>
</head>
<body data-theme="dark">

    <header class="nav-header">
        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> <span class="lang-en">BACK TO CORE</span><span class="lang-ua" style="display:none;">ДО ГОЛОВНОЇ</span>
        </a>
        <div class="nav-controls">
            <button class="control-btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <button class="control-btn" onclick="toggleLang()" style="min-width: 80px;">UA / EN</button>
        </div>
    </header>

    <main>
        <h1 class="lang-en">ALL<br>PROJECTS</h1>
        <h1 class="lang-ua" style="display:none;">ВСІ<br>ПРОЕКТИ</h1>

        <div class="filters" id="filtersContainer">
            <button class="filter-btn active" onclick="filterProjects('ALL', this)">ALL</button>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
    </main>

    <footer id="footer">
        <div class="footer-grid">
            <div class="footer-contacts">
                <a href="tel:+380932097079" id="f-phone-link">+380 93 209 70 79</a>
                <a href="mailto:Destro729@gmail.com" class="footer-email" id="f-email-link">Destro729@gmail.com</a>
                <div class="social-icons">
                    <a href="#" target="_blank" title="WhatsApp" id="f-wa"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="#" target="_blank" title="Telegram" id="f-tg"><i class="fa-brands fa-telegram"></i></a>
                    <a href="#" target="_blank" title="GitHub" id="f-gh"><i class="fa-brands fa-github"></i></a>
                    <a href="#" title="Discord" id="f-ds"><i class="fa-brands fa-discord"></i></a>
                    <a href="#" title="Behance" id="f-bh"><i class="fa-brands fa-behance"></i></a>
                    <a href="#" title="Fiverr" id="f-fv"><i class="fa-solid fa-f"></i></a>
                </div>
            </div>
            <div style="text-align: right;">
                <p id="footer-logo-text" style="font-weight: 800; color: var(--text); font-family: var(--font-hd); text-transform: uppercase;">ANOR CORE</p>
                <p style="color: var(--text-secondary); margin-top: 5px;" class="lang-en" id="f-role-en">Designer & AI Engineer 2026</p>
                <p style="color: var(--text-secondary); margin-top: 5px; display:none;" class="lang-ua" id="f-role-ua">Дизайнер та AI Інженер 2026</p>
                <p id="footer-copy" style="color: var(--text-secondary); opacity: 0.5; font-size: 0.8rem; margin-top: 15px;" class="lang-en">&copy; All Rights Reserved.</p>
                <p style="color: var(--text-secondary); opacity: 0.5; font-size: 0.8rem; margin-top: 15px; display:none;" class="lang-ua">&copy; Всі права захищено.</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentLang = localStorage.getItem('anor_lang') || 'ua';
        let currentFilter = 'ALL';
        let allProjects = {};

        window.toggleTheme = () => {
            document.body.classList.toggle('light-theme');
        };
        
        window.toggleLang = () => {
            currentLang = currentLang === 'en' ? 'ua' : 'en';
            localStorage.setItem('anor_lang', currentLang);
            updateUILanguage();
            renderProjects(currentFilter);
        };

        function updateUILanguage() {
            const ens = document.querySelectorAll('.lang-en');
            const uas = document.querySelectorAll('.lang-ua');
            ens.forEach(el => el.style.display = currentLang === 'en' ? 'block' : 'none');
            uas.forEach(el => el.style.display = currentLang === 'ua' ? 'block' : 'none');
            
            const allBtn = document.querySelector('.filter-btn[onclick*="ALL"]');
            if (allBtn) {
                allBtn.innerText = currentLang === 'en' ? 'ALL' : 'ВСІ';
            }
        }

        window.filterProjects = (category, btn) => {
            currentFilter = category;
            if(btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            renderProjects(category);
        };

        window.toggleLike = async (event, btn, projectId) => {
            event.preventDefault();
            event.stopPropagation();
            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);
            const isLiked = icon.classList.contains('fa-solid');
            const newCount = isLiked ? Math.max(0, count - 1) : count + 1;

            if (isLiked) {
                icon.classList.replace('fa-solid', 'fa-regular');
                btn.classList.remove('liked');
            } else {
                icon.classList.replace('fa-regular', 'fa-solid');
                btn.classList.add('liked');
            }
            countSpan.innerText = newCount;

            try {
                await update(ref(db, `projects/${projectId}`), { likes: newCount });
            } catch (e) { console.error("Error updating likes:", e); }
        };

        // Завантаження категорій
        onValue(ref(db, 'categories'), (snapshot) => {
            const container = document.getElementById('filtersContainer');
            const data = snapshot.val();
            if (!data) return;
            
            container.innerHTML = `<button class="filter-btn ${currentFilter === 'ALL' ? 'active' : ''}" onclick="filterProjects('ALL', this)">${currentLang === 'en' ? 'ALL' : 'ВСІ'}</button>`;
            
            Object.keys(data).forEach(key => {
                const catName = data[key].name || data[key];
                const isActive = currentFilter === catName ? 'active' : '';
                container.innerHTML += `<button class="filter-btn ${isActive}" onclick="filterProjects('${catName}', this)">${catName}</button>`;
            });
        });

        // Завантаження проектів
        onValue(ref(db, 'projects'), (snapshot) => {
            allProjects = snapshot.val() || {};
            renderProjects(currentFilter);
        });

        function renderProjects(filter) {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = "";
            
            const projectsList = Object.keys(allProjects).map(key => ({ id: key, ...allProjects[key] }));
            projectsList.sort((a, b) => (b.time || 0) - (a.time || 0));

            projectsList.forEach(p => {
                const cats = p.categories || [];
                if (filter !== 'ALL' && !cats.includes(filter)) return;

                const title = p.title.split(' / ')[currentLang === 'ua' ? 0 : 1] || p.title;
                const desc = p.shortDesc.split(' / ')[currentLang === 'ua' ? 0 : 1] || p.shortDesc;
                const img = p.mainImage || 'https://via.placeholder.com/600x400/111/fff?text=No+Image';
                const likes = p.likes || 0;
                const meta = p.customMeta || '';

                const card = document.createElement('a');
                card.className = 'project-card';
                // ВИПРАВЛЕНО: Шлях змінено на project-details.html для відповідності вашому файлу
                card.href = `project-details.html?id=${p.id}`;
                
                card.innerHTML = `
                    <div class="project-img" style="background: url('${img}')"></div>
                    <div class="project-content">
                        <div class="project-tags">
                            ${cats.map(c => `<span class="tag">${c}</span>`).join('')}
                        </div>
                        <span class="project-meta">${meta}</span>
                        <h3 class="project-title">${title}</h3>
                        <p class="project-desc">${desc}</p>
                        <div class="project-footer">
                            <div class="like-btn" onclick="toggleLike(event, this, '${p.id}')">
                                <i class="fa-regular fa-heart"></i> 
                                <span class="count">${likes}</span>
                            </div>
                            <span style="color: var(--accent); font-weight: 800; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase;">Details</span>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
            
            if (grid.innerHTML === "") {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; opacity: 0.5;'>The library is empty.</p>";
            }
        }

        // Глобальні налаштування (футер)
        onValue(ref(db, 'settings/global'), (snapshot) => {
            const d = snapshot.val();
            if(!d) return;
            document.getElementById('footer-logo-text').innerText = d.logoText || "ANOR CORE";
            document.getElementById('footer-copy').innerText = d.copyright || "© 2026";
        });

        onValue(ref(db, 'settings/footer'), (snapshot) => {
            const f = snapshot.val();
            if (!f) return;
            if (f.phone) {
                document.getElementById('f-phone-link').innerText = f.phone;
                document.getElementById('f-phone-link').href = `tel:${f.phone.replace(/\\s/g, '')}`;
            }
            if (f.email) {
                document.getElementById('f-email-link').innerText = f.email;
                document.getElementById('f-email-link').href = `mailto:${f.email}`;
            }
            if (f.roleUa) document.getElementById('f-role-ua').innerText = f.roleUa;
            if (f.roleEn) document.getElementById('f-role-en').innerText = f.roleEn;
            if (f.tg) document.getElementById('f-tg').href = f.tg;
            if (f.wa) document.getElementById('f-wa').href = f.wa;
            if (f.gh) document.getElementById('f-gh').href = f.gh;
            if (f.ds) document.getElementById('f-ds').href = f.ds;
            if (f.bh) document.getElementById('f-bh').href = f.bh;
            if (f.fv) document.getElementById('f-fv').href = f.fv;
        });

        // Ініціалізація мови при старті
        updateUILanguage();
    </script>
</body>
</html>
