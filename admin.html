<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anor Core | Admin 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505; --sidebar: #0f0f0f; --text: #ffffff;
            --text-secondary: #a1a1a6; --accent: #0071e3;
            --border: rgba(255, 255, 255, 0.1); --card: #161617;
            --font-hd: 'Unbounded', sans-serif; --font-main: 'Inter', sans-serif;
        }
        body.light-theme {
            --bg: #f5f5f7; --sidebar: #ffffff; --text: #1d1d1f;
            --text-secondary: #86868b; --accent: #0071e3;
            --border: rgba(0, 0, 0, 0.1); --card: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 40px 20px; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 100; }
        .main-content { margin-left: 280px; flex-grow: 1; padding: 60px 5%; }
        .logo { font-family: var(--font-hd); font-size: 0.9rem; color: var(--accent); margin-bottom: 40px; text-transform: uppercase; }
        .nav-item { padding: 15px 20px; border-radius: 12px; color: var(--text-secondary); text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; border: none; background: none; width: 100%; font-size: 0.9rem; font-weight: 600; }
        .nav-item.active { background: var(--card); color: var(--text); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 800; margin-bottom: 8px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: var(--text); outline: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-family: var(--font-hd); font-size: 0.65rem; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none; }
        .project-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">ANOR SYSTEM 3.0</div>
        <button class="nav-item active" onclick="showSection('projects')"><i class="fa-solid fa-rocket"></i> Проєкти</button>
        <button class="nav-item" onclick="showSection('footer')"><i class="fa-solid fa-wrench"></i> Футер & Глобальні</button>
        <div style="margin-top: auto;">
            <a href="all-projects.html" class="nav-item"><i class="fa-solid fa-eye"></i> На сайт</a>
        </div>
    </aside>

    <main class="main-content">
        <section id="sec-projects">
            <h1>Управління Артефактами</h1>
            <div class="card">
                <div class="form-group">
                    <label>Назва проєкту (UA)</label>
                    <input type="text" id="p-title" placeholder="Назва українською">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Мета-тег (над назвою)</label>
                        <input type="text" id="p-meta" placeholder="Automation, 2026">
                    </div>
                    <div class="form-group">
                        <label>Категорія (Фільтр)</label>
                        <input type="text" id="p-cat" placeholder="PYTHON">
                    </div>
                </div>
                <div class="form-group">
                    <label>Теги (через кому)</label>
                    <input type="text" id="p-tags" placeholder="AI, STEALTH, BROWSER">
                </div>
                <div class="form-group">
                    <label>Короткий опис (UA)</label>
                    <input type="text" id="p-short" placeholder="Для картки в архіві">
                </div>
                <div class="form-group">
                    <label>Повний опис (UA)</label>
                    <textarea id="p-desc" rows="5" placeholder="Детально про логіку..."></textarea>
                </div>
                <div class="form-group">
                    <label>Головне зображення (URL)</label>
                    <input type="text" id="p-img" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Галерея (URL-адреси через кому)</label>
                    <textarea id="p-gallery" rows="2" placeholder="url1, url2, url3"></textarea>
                </div>
                <div class="form-group">
                    <label>Посилання на проект/результат (URL)</label>
                    <input type="text" id="p-link" placeholder="https://github.com/...">
                </div>
                <button class="btn" onclick="saveProject()">Зберегти в Спектраль</button>
            </div>

            <div class="card" id="project-list"></div>
        </section>

        <section id="sec-footer" class="hidden">
            <h1>Налаштування Футера</h1>
            <div class="card">
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="text" id="f-phone">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="f-email">
                </div>
                <div class="form-group">
                    <label>Роль (UA)</label>
                    <input type="text" id="f-role-ua">
                </div>
                <div class="form-group">
                    <label>Роль (EN)</label>
                    <input type="text" id="f-role-en">
                </div>
                <button class="btn" onclick="saveFooter()">Оновити Футер</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.showSection = (name) => {
            document.getElementById('sec-projects').classList.toggle('hidden', name !== 'projects');
            document.getElementById('sec-footer').classList.toggle('hidden', name !== 'footer');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // --- ПРОЕКТИ ---
        window.saveProject = () => {
            const data = {
                title: document.getElementById('p-title').value,
                customMeta: document.getElementById('p-meta').value,
                category: document.getElementById('p-cat').value,
                tags: document.getElementById('p-tags').value,
                shortDesc: document.getElementById('p-short').value,
                description: document.getElementById('p-desc').value,
                mainImage: document.getElementById('p-img').value,
                gallery: document.getElementById('p-gallery').value.split(',').map(s => s.trim()),
                link: document.getElementById('p-link').value,
                time: Date.now()
            };
            push(ref(db, 'projects'), data).then(() => alert("Проект додано!"));
        };

        onValue(ref(db, 'projects'), (snap) => {
            const list = document.getElementById('project-list');
            list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                list.innerHTML += `
                    <div class="project-item">
                        <span>${data[id].title}</span>
                        <button onclick="deleteProject('${id}')" style="background:none; border:none; color:red; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            }
        });

        window.deleteProject = (id) => confirm("Видалити?") && remove(ref(db, 'projects/' + id));

        // --- ФУТЕР ---
        window.saveFooter = () => {
            const data = {
                phone: document.getElementById('f-phone').value,
                email: document.getElementById('f-email').value,
                roleUa: document.getElementById('f-role-ua').value,
                roleEn: document.getElementById('f-role-en').value,
                name: "MAKSYM RIZUN"
            };
            set(ref(db, 'settings/footer'), data).then(() => alert("Футер оновлено!"));
        };
    </script>
</body>
</html>
