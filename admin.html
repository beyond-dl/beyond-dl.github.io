<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anor Core | Versailles Admin 3.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --border: rgba(255, 255, 255, 0.08);
            --card: #121212;
            --input-bg: #000000;
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --danger: #ff3b30;
        }

        body.light-theme {
            --bg: #f5f5f7;
            --sidebar: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --border: rgba(0, 0, 0, 0.1);
            --card: #ffffff;
            --input-bg: #fbfbfd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s ease; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        /* --- MAIN CONTENT (Виправлено центрування) --- */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 60px 5%; 
            width: calc(100% - 280px);
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрування контенту всередині */
        }

        section { width: 100%; max-width: 1200px; } /* Обмежувач ширини для балансу */

        .logo {
            font-family: var(--font-hd);
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 50px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            border: none;
            background: none;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .nav-item.active { color: var(--text); background: rgba(255, 255, 255, 0.05); }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            width: 100%;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .full-width { grid-column: 1 / -1; }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 800;
            margin-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 15px;
            color: var(--text);
            outline: none;
            font-family: inherit;
        }

        select[multiple] { height: 120px; padding: 10px; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-family: var(--font-hd);
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 900;
            margin-top: 20px;
        }

        /* --- ADAPTIVITY --- */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .nav-label, .nav-item span, .logo { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: relative; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { margin-left: 0; width: 100%; padding: 30px 20px; }
            .form-grid { grid-template-columns: 1fr; }
        }

        .hidden { display: none; }
    </style>
</head>
<body class="dark-theme">

    <aside class="sidebar">
        <div class="logo">ANOR CORE 3.6</div>
        <div class="nav-group">
            <span class="nav-label">Контент</span>
            <button class="nav-item active" id="btn-projects" onclick="showSection('projects')">
                <i class="fa-solid fa-rocket"></i> <span>Проєкти</span>
            </button>
            <button class="nav-item" id="btn-categories" onclick="showSection('categories')">
                <i class="fa-solid fa-tags"></i> <span>Категорії</span>
            </button>
        </div>
        <div class="nav-group" style="margin-top: 20px;">
            <span class="nav-label">Конфігурація</span>
            <button class="nav-item" id="btn-footer" onclick="showSection('footer')">
                <i class="fa-solid fa-sliders"></i> <span>Глобальні</span>
            </button>
        </div>
        <div style="margin-top: auto;">
            <button class="nav-item" onclick="document.body.classList.toggle('light-theme')">
                <i class="fa-solid fa-circle-half-stroke"></i> <span>Змінити тему</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <section id="sec-projects">
            <h1>Управління Артефактами</h1>
            <div class="card">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Назва проєкту (UA/EN)</label>
                        <input type="text" id="p-title">
                    </div>
                    <div class="form-group">
                        <label>Мета-тег</label>
                        <input type="text" id="p-meta">
                    </div>
                    <div class="form-group">
                        <label>Категорії (Утримуйте Ctrl для вибору декількох)</label>
                        <select id="p-cat" multiple></select>
                    </div>
                    <div class="form-group full-width">
                        <label>Теги (через кому)</label>
                        <input type="text" id="p-tags">
                    </div>
                    <div class="form-group full-width">
                        <label>Повний опис (Логіка)</label>
                        <textarea id="p-desc" rows="6"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Головне зображення (URL)</label>
                        <input type="text" id="p-img">
                    </div>
                    <div class="form-group">
                        <label>GitHub Link</label>
                        <input type="text" id="p-link">
                    </div>
                </div>
                <button class="btn" onclick="saveProject()">Зберегти Артефакт</button>
            </div>
            <div id="project-list"></div>
        </section>

        <section id="sec-categories" class="hidden">
            <h1>Матриця Категорій</h1>
            <div class="card">
                <input type="text" id="new-cat-name" placeholder="Назва">
                <button class="btn" onclick="addCategory()">Додати</button>
            </div>
            <div id="cat-list"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.showSection = (name) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + name).classList.remove('hidden');
        };

        window.addCategory = () => {
            const name = document.getElementById('new-cat-name').value;
            if(name) push(ref(db, 'categories'), { name: name.toUpperCase() });
            document.getElementById('new-cat-name').value = "";
        };

        onValue(ref(db, 'categories'), (snap) => {
            const list = document.getElementById('cat-list'), select = document.getElementById('p-cat');
            list.innerHTML = ""; select.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                list.innerHTML += `<div style="padding:10px; background:var(--input-bg); margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between;">
                    ${data[id].name} <i class="fa-solid fa-trash" onclick="deleteItem('categories/${id}')" style="color:var(--danger); cursor:pointer;"></i>
                </div>`;
                select.innerHTML += `<option value="${data[id].name}">${data[id].name}</option>`;
            }
        });

        window.saveProject = () => {
            const selectedCats = Array.from(document.getElementById('p-cat').selectedOptions).map(o => o.value);
            const data = {
                title: document.getElementById('p-title').value,
                customMeta: document.getElementById('p-meta').value,
                categories: selectedCats, // Масив категорій
                tags: document.getElementById('p-tags').value,
                description: document.getElementById('p-desc').value,
                mainImage: document.getElementById('p-img').value,
                link: document.getElementById('p-link').value,
                time: Date.now()
            };
            push(ref(db, 'projects'), data).then(() => alert("Артефакт збережено!"));
        };

        window.deleteItem = (path) => { if(confirm("Видалити?")) remove(ref(db, path)); };

        onValue(ref(db, 'projects'), (snap) => {
            const list = document.getElementById('project-list');
            list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                list.innerHTML += `<div class="card" style="padding:20px; margin-bottom:10px; display:flex; justify-content:space-between;">
                    <span>${data[id].title}</span>
                    <i class="fa-solid fa-trash" onclick="deleteItem('projects/${id}')" style="color:var(--danger); cursor:pointer;"></i>
                </div>`;
            }
        });
    </script>
</body>
</html>
