<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anor Core | Versailles Admin 3.8 (Elite Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --accent-hover: #005bbd;
            --border: rgba(255, 255, 255, 0.1);
            --card: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(0, 0, 0, 0.3);
            --glow-color: rgba(0, 113, 227, 0.3);
            --font-hd: 'Unbounded', sans-serif;
            --font-main: 'Inter', sans-serif;
            --danger: #ff3b30;
            --success: #34c759;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg: #f5f5f7;
            --sidebar: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: rgba(0, 0, 0, 0.08);
            --card: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(0, 0, 0, 0.03);
            --glow-color: rgba(0, 113, 227, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s;
        }

        .cursor-glow {
            position: fixed; width: 450px; height: 450px;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: -1;
            transform: translate(-50%, -50%); will-change: transform;
        }

        .sidebar {
            width: 280px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .logo {
            font-family: var(--font-hd);
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 50px;
            letter-spacing: -1px;
            text-transform: uppercase;
            font-weight: 900;
            padding-left: 15px;
        }

        .nav-group { margin-bottom: 30px; }
        .nav-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 15px;
            padding-left: 15px;
            display: block;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            border: none;
            background: none;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: left;
            transition: var(--transition);
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text);
            background: var(--accent);
            color: white;
        }

        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 60px 5%; 
            width: calc(100% - 280px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        section { width: 100%; max-width: 1600px; }

        h1 {
            font-family: var(--font-hd);
            font-size: 1.8rem;
            margin-bottom: 40px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            width: 100%;
            transition: var(--transition);
        }
        
        .card:hover {
            border-color: var(--accent);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group { margin-bottom: 25px; position: relative; }
        .full-width { grid-column: span 2; }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            font-family: var(--font-hd);
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 15px;
            color: var(--text);
            outline: none;
            font-family: var(--font-main);
            transition: var(--transition);
        }

        select option {
            background-color: var(--bg);
            color: var(--text);
        }

        input:focus, textarea:focus, select:focus { 
            border-color: var(--accent); 
            background: rgba(255,255,255,0.08);
        }

        .tags-custom-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            min-height: 56px;
            cursor: pointer;
            transition: var(--transition);
        }
        .tags-custom-container:hover { border-color: var(--accent); }

        .tag-pill {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .tag-pill i { cursor: pointer; font-size: 0.7rem; }

        .tags-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 15px;
            margin-top: 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tags-dropdown.active { display: block; }

        .tag-option {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .tag-option:hover { background: rgba(255,255,255,0.05); }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-family: var(--font-hd);
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            letter-spacing: 1px;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 113, 227, 0.3); }

        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--input-bg);
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .project-item:hover { border-color: var(--accent); transform: translateX(5px); }
        
        .social-add-row {
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px;
            align-items: stretch;
            background: var(--input-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .project-actions { display: flex; gap: 10px; }
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 8px;
            transition: transform 0.2s, color 0.2s;
        }
        .btn-edit { color: var(--accent); }
        .btn-edit:hover { transform: scale(1.1); }
        .btn-delete { color: var(--text-secondary); }
        .btn-delete:hover { color: var(--danger); transform: scale(1.1); }

        .admin-controls {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .control-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        .control-btn:hover {
            border-color: var(--text);
            color: var(--text);
        }

        .control-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .hidden { display: none; }
        
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .social-manager-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .nav-label, .nav-item span, .logo { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); }
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="cursor-glow" id="glow"></div>
    <aside class="sidebar">
        <div class="logo">ANOR CORE 3.8</div>
        
        <div class="nav-group">
            <span class="nav-label" data-t="group_content">Контент</span>
            <button class="nav-item active" id="btn-projects" onclick="showSection('projects')">
                <i class="fa-solid fa-rocket"></i> <span data-t="nav_projects">Проєкти</span>
            </button>
            <button class="nav-item" id="btn-categories" onclick="showSection('categories')">
                <i class="fa-solid fa-tags"></i> <span data-t="nav_cats">Категорії</span>
            </button>
        </div>

        <div class="nav-group">
            <span class="nav-label" data-t="group_config">Конфігурація</span>
            <button class="nav-item" id="btn-footer" onclick="showSection('footer')">
                <i class="fa-solid fa-sliders"></i> <span data-t="nav_global">Глобальні & Футер</span>
            </button>
        </div>

        <div class="admin-controls">
            <div style="margin-bottom: 15px; display: flex; gap: 5px;">
                <button class="control-btn active" id="theme-dark" onclick="setTheme('dark')"><i class="fa-solid fa-moon"></i></button>
                <button class="control-btn" id="theme-light" onclick="setTheme('light')"><i class="fa-solid fa-sun"></i></button>
                <div style="margin-left: auto;">
                    <button class="control-btn lang-btn" id="lang-ua" onclick="setLang('ua')">UA</button>
                    <button class="control-btn lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
                </div>
            </div>
            <a href="index.html" target="_blank" class="nav-item" style="background: rgba(0,113,227,0.1); color: var(--accent);">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> <span data-t="to_site">На сайт</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        
        <section id="sec-projects">
            <h1 data-t="h_projects">Управління Артефактами</h1>
            <div class="card">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label data-t="l_title">Назва проєкту</label>
                        <input type="text" id="p-title" placeholder="Приклад: TikTok Stealth Bot / Stealth Bot EN">
                    </div>
                    
                    <div class="form-group">
                        <label data-t="l_meta">Мета-тег (Над назвою)</label>
                        <input type="text" id="p-meta" placeholder="Приклад: AUTOMATION, 2026">
                    </div>

                    <div class="form-group">
                        <label data-t="l_cat">Категорії та Технології</label>
                        <div class="tags-custom-container" id="tags-display" onclick="toggleTagsDropdown(event)">
                            <span style="color: var(--text-secondary); font-size: 0.9rem;">Оберіть зі списку...</span>
                        </div>
                        <div class="tags-dropdown" id="tags-dropdown"></div>
                    </div>

                    <div class="form-group full-width">
                        <label data-t="l_short">Короткий опис (UA/EN)</label>
                        <input type="text" id="p-short" placeholder="Короткий рядок для картки на головній (двома мовами через /)">
                    </div>

                    <div class="form-group full-width">
                        <label data-t="l_desc">Повний опис (Логіка та деталі)</label>
                        <textarea id="p-desc" rows="5" placeholder="Розгорнутий текст для сторінки проекту. Використовуйте <br> для переносів."></textarea>
                    </div>

                    <div class="form-group">
                        <label data-t="l_img">Головне зображення (Прямий URL)</label>
                        <input type="text" id="p-img" placeholder="https://example.com/image.jpg">
                    </div>

                    <div class="form-group">
                        <label data-t="l_link">GitHub або Demo Посилання</label>
                        <input type="text" id="p-link" placeholder="https://github.com/user/repo">
                    </div>

                    <div class="form-group full-width">
                        <label data-t="l_gallery">Додаткові зображення (URL через кому)</label>
                        <textarea id="p-gallery" rows="2" placeholder="url1.jpg, url2.jpg, url3.jpg"></textarea>
                    </div>

                    <div class="form-group full-width">
                        <div class="toggle-container">
                             <input type="checkbox" id="p-on-main" style="width: 20px; height: 20px;">
                             <label style="margin-bottom: 0;" data-t="l_main">Відображати у блоці 'Selected Works'</label>
                        </div>
                    </div>
                </div>
                
                <button class="btn" id="btn-save-project" onclick="saveProject()">
                    <i class="fa-solid fa-sparkles"></i> <span id="btn-text" data-t="btn_save">Зберегти в Спектраль</span>
                </button>
                <button class="btn hidden" id="btn-cancel-edit" onclick="cancelEdit()" style="background: var(--danger); margin-left: 10px;">
                    <span data-t="btn_cancel">Скасувати</span>
                </button>
            </div>

            <div id="project-list-container">
                <label data-t="l_existing" style="margin-bottom: 20px;">Існуючі Проєкти в базі</label>
                <div id="project-list"></div>
            </div>
        </section>

        <section id="sec-categories" class="hidden">
            <h1 data-t="h_cats">Матриця Категорій</h1>
            <div class="card">
                <div class="form-group">
                    <label data-t="l_new_cat">Назва нової категорії/тегу</label>
                    <input type="text" id="new-cat-name" placeholder="Приклад: UI/UX, PYTHON, AI">
                </div>
                <button class="btn" onclick="addCategory()" data-t="btn_add_cat">Додати до Матриці</button>
            </div>
            <div id="cat-list" class="card"></div>
        </section>

        <section id="sec-footer" class="hidden">
            <h1 data-t="h_global">Налаштування Футера & Системи</h1>
            <div class="card">
                <div class="form-grid">
                    <div class="form-group"><label>Текст Логотипу</label><input type="text" id="f-logo" placeholder="ANOR"></div>
                    <div class="form-group"><label>Копірайт</label><input type="text" id="f-copy" placeholder="© 2026 ANOR CORE SYSTEM"></div>
                    
                    <div class="form-group full-width">
                        <label>Опис під лого (UA)</label>
                        <input type="text" id="f-role-ua" placeholder="UI\UX Веб Дизайнер та ШІ Python розробник.">
                    </div>
                    <div class="form-group full-width">
                        <label>Опис під лого (EN)</label>
                        <input type="text" id="f-role-en" placeholder="UI\UX Web Designer & AI Python Developer.">
                    </div>

                    <div class="form-group"><label>Контактний Телефон</label><input type="text" id="f-phone" placeholder="+380..."></div>
                    <div class="form-group"><label>Контактний Email</label><input type="text" id="f-email" placeholder="example@gmail.com"></div>
                    
                    <div class="form-group full-width">
                        <label>Менеджер Соціальних Мереж</label>
                        <div class="social-add-row">
                            <select id="new-social-platform" style="flex: 0 0 150px;">
                                <option value="telegram">Telegram</option>
                                <option value="whatsapp">WhatsApp</option>
                                <option value="github">GitHub</option>
                                <option value="discord">Discord</option>
                                <option value="behance">Behance</option>
                                <option value="facebook">Facebook</option>
                                <option value="instagram">Instagram</option>
                                <option value="linkedin">LinkedIn</option>
                                <option value="fiverr">Fiverr</option>
                                <option value="link">Other Link</option>
                            </select>
                            <input type="text" id="new-social-url" placeholder="Вставте URL (https://...)" style="flex: 1;">
                            <button class="btn" id="btn-add-social" onclick="addSocialLink()" style="padding: 12px 25px; margin: 0; height: auto; border-radius: 15px;"><i class="fa-solid fa-plus"></i></button>
                        </div>
                        <div id="social-links-list" class="social-manager-list"></div>
                    </div>
                </div>
                <button class="btn" onclick="saveFooter()" data-t="btn_update">Оновити Глобальні Налаштування</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://anor-core-2026-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let editingProjectId = null;
        let currentLang = 'ua';
        let selectedCategories = [];
        let allCategories = [];
        let activeSocials = [];
        let editingSocialIndex = null;
        
        // Ефект світіння (як на Index)
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        const iconMap = {
            telegram: 'fa-brands fa-telegram',
            whatsapp: 'fa-brands fa-whatsapp',
            github: 'fa-brands fa-github',
            discord: 'fa-brands fa-discord',
            behance: 'fa-brands fa-behance',
            facebook: 'fa-brands fa-facebook',
            instagram: 'fa-brands fa-instagram',
            linkedin: 'fa-brands fa-linkedin',
            fiverr: 'fa-solid fa-f',
            link: 'fa-solid fa-link'
        };

        const translations = {
            ua: {
                group_content: "Контент", nav_projects: "Проєкти", nav_cats: "Категорії",
                group_config: "Конфігурація", nav_global: "Глобальні & Футер", to_site: "На сайт",
                h_projects: "Управління Артефактами", l_title: "Назва проєкту", l_meta: "Мета-тег",
                l_cat: "Категорії", l_short: "Короткий опис", l_desc: "Повний опис",
                l_img: "Зображення URL", l_link: "GitHub Link", l_gallery: "Галерея URL",
                l_main: "На головну", btn_save: "Зберегти в Спектраль", l_existing: "Існуючі Проєкти",
                h_cats: "Матриця Категорій", btn_add_cat: "Додати", btn_cancel: "Скасувати", btn_update: "Оновити"
            },
            en: {
                group_content: "Content", nav_projects: "Projects", nav_cats: "Categories",
                group_config: "Config", nav_global: "Global & Footer", to_site: "To Site",
                h_projects: "Artifact Management", l_title: "Project Title", l_meta: "Meta-tag",
                l_cat: "Categories", l_short: "Short Desc", l_desc: "Full Logic",
                l_img: "Image URL", l_link: "GitHub Link", l_gallery: "Gallery URLs",
                l_main: "Show on Main", btn_save: "Save to Spectral", l_existing: "Existing Projects",
                h_cats: "Category Matrix", btn_add_cat: "Add", btn_cancel: "Cancel", btn_update: "Update"
            }
        };

        window.setLang = (lang) => {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                el.innerText = translations[lang][key] || el.innerText;
            });
        };

        window.showSection = (name) => {
            ['projects', 'categories', 'footer'].forEach(s => document.getElementById('sec-' + s).classList.add('hidden'));
            document.getElementById('sec-' + name).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + name).classList.add('active');
        };

        window.setTheme = (theme) => {
            document.body.classList.toggle('light-theme', theme === 'light');
            document.getElementById('theme-light').classList.toggle('active', theme === 'light');
            document.getElementById('theme-dark').classList.toggle('active', theme === 'dark');
        };

        // --- TAGS UI LOGIC ---
        window.toggleTagsDropdown = (e) => {
            e.stopPropagation();
            document.getElementById('tags-dropdown').classList.toggle('active');
        };

        document.addEventListener('click', () => {
            document.getElementById('tags-dropdown').classList.remove('active');
        });

        function renderTagsUI() {
            const display = document.getElementById('tags-display');
            const dropdown = document.getElementById('tags-dropdown');
            
            if (selectedCategories.length === 0) {
                display.innerHTML = '<span style="color: var(--text-secondary); font-size: 0.9rem;">Оберіть зі списку...</span>';
            } else {
                display.innerHTML = selectedCategories.map(cat => `
                    <span class="tag-pill">
                        ${cat} 
                        <i class="fa-solid fa-xmark" onclick="event.stopPropagation(); removeTag('${cat}')"></i>
                    </span>
                `).join('');
            }

            dropdown.innerHTML = allCategories.map(cat => {
                const isSelected = selectedCategories.includes(cat.name);
                return `
                    <div class="tag-option" onclick="event.stopPropagation(); toggleTag('${cat.name}')">
                        <span>${cat.name}</span>
                        <i class="fa-solid ${isSelected ? 'fa-xmark' : 'fa-plus'}"></i>
                    </div>
                `;
            }).join('');
        }

        window.toggleTag = (name) => {
            if (selectedCategories.includes(name)) {
                selectedCategories = selectedCategories.filter(c => c !== name);
            } else {
                selectedCategories.push(name);
            }
            renderTagsUI();
        };

        window.removeTag = (name) => {
            selectedCategories = selectedCategories.filter(c => c !== name);
            renderTagsUI();
        };

        // --- CATEGORIES ---
        window.addCategory = () => {
            const name = document.getElementById('new-cat-name').value;
            if(name) push(ref(db, 'categories'), { name: name.toUpperCase() });
            document.getElementById('new-cat-name').value = "";
        };

        onValue(ref(db, 'categories'), (snap) => {
            const list = document.getElementById('cat-list');
            list.innerHTML = "";
            const data = snap.val();
            allCategories = [];
            for(let id in data) {
                allCategories.push({id, name: data[id].name});
                list.innerHTML += `<div class="project-item"><span>${data[id].name}</span><button class="btn-icon btn-delete" onclick="deleteItem('categories/${id}')"><i class="fa-solid fa-trash-can"></i></button></div>`;
            }
            renderTagsUI();
        });

        // --- PROJECTS LOGIC ---
        window.saveProject = () => {
            const data = {
                title: document.getElementById('p-title').value,
                customMeta: document.getElementById('p-meta').value,
                categories: selectedCategories, 
                shortDesc: document.getElementById('p-short').value,
                description: document.getElementById('p-desc').value,
                mainImage: document.getElementById('p-img').value,
                gallery: document.getElementById('p-gallery').value.split(',').map(s => s.trim()).filter(s => s),
                link: document.getElementById('p-link').value,
                onMain: document.getElementById('p-on-main').checked,
                time: Date.now()
            };

            if(!data.title) return alert("Title is required!");

            if(editingProjectId) {
                update(ref(db, `projects/${editingProjectId}`), data).then(() => {
                    alert("Артефакт оновлено!");
                    cancelEdit();
                });
            } else {
                push(ref(db, 'projects'), data).then(() => {
                    alert("Артефакт створено!");
                    clearForm();
                });
            }
        };

        window.editProject = (id) => {
            onValue(ref(db, `projects/${id}`), (snap) => {
                const d = snap.val();
                if(!d) return;
                editingProjectId = id;
                document.getElementById('p-title').value = d.title || "";
                document.getElementById('p-meta').value = d.customMeta || "";
                
                selectedCategories = d.categories || (d.category ? [d.category] : []);
                renderTagsUI();

                document.getElementById('p-short').value = d.shortDesc || "";
                document.getElementById('p-desc').value = d.description || "";
                document.getElementById('p-img').value = d.mainImage || "";
                document.getElementById('p-link').value = d.link || "";
                document.getElementById('p-gallery').value = d.gallery ? d.gallery.join(', ') : "";
                document.getElementById('p-on-main').checked = d.onMain || false;
                
                document.getElementById('btn-text').innerText = "Оновити Артефакт";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, { onlyOnce: true });
        };

        window.cancelEdit = () => {
            editingProjectId = null;
            clearForm();
            document.getElementById('btn-text').innerText = translations[currentLang].btn_save;
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        };

        function clearForm() {
            document.querySelectorAll('#sec-projects input, #sec-projects textarea').forEach(i => i.value = "");
            document.getElementById('p-on-main').checked = false;
            selectedCategories = [];
            renderTagsUI();
        }

        onValue(ref(db, 'projects'), (snap) => {
            const list = document.getElementById('project-list');
            list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                const catsLabel = data[id].categories ? data[id].categories.join(', ') : (data[id].category || "");
                list.innerHTML += `
                    <div class="project-item">
                        <div class="project-info">
                            <h4 style="font-family: var(--font-hd); font-size: 0.9rem;">${data[id].title}</h4>
                            <span style="font-size:0.75rem; color:var(--text-secondary)">${catsLabel} ${data[id].onMain ? ' • [SELECTED]' : ''}</span>
                        </div>
                        <div class="project-actions">
                            <button class="btn-icon btn-edit" onclick="editProject('${id}')"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-icon btn-delete" onclick="deleteItem('projects/${id}')"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>`;
            }
        });

        // --- FOOTER & GLOBAL ---
        window.addSocialLink = () => {
            const platform = document.getElementById('new-social-platform').value;
            const url = document.getElementById('new-social-url').value.trim();
            if(!url) return alert("Введіть посилання");
            
            // Ініціалізація якщо масив ще не завантажився
            if (!activeSocials) activeSocials = [];

            if (editingSocialIndex !== null) {
                activeSocials[editingSocialIndex] = { platform, url };
                editingSocialIndex = null;
                document.querySelector('#btn-add-social i').className = 'fa-solid fa-plus';
                // Скидаємо стиль кнопки
                document.getElementById('btn-add-social').style.background = '';
                updateSocialBtnState(false);
            } else {
                activeSocials.push({ platform, url });
            }
            
            document.getElementById('new-social-url').value = "";
            document.getElementById('new-social-platform').value = "telegram";
            renderSocialManager();
        };

        window.deleteSocial = (index) => {
            activeSocials.splice(index, 1);
            // Якщо видалили елемент, який редагували - скидаємо режим редагування
            if (editingSocialIndex === index) {
                editingSocialIndex = null;
                updateSocialBtnState(false);
                document.getElementById('new-social-url').value = "";
            }
            renderSocialManager();
        };

        window.editSocial = (index) => {
            const item = activeSocials[index];
            document.getElementById('new-social-platform').value = item.platform;
            document.getElementById('new-social-url').value = item.url;
            editingSocialIndex = index;
            document.querySelector('#btn-add-social i').className = 'fa-solid fa-check';
            document.getElementById('btn-add-social').style.background = 'var(--success)';
            updateSocialBtnState(true);
        };

        function updateSocialBtnState(isEditing) {
            const btn = document.getElementById('btn-add-social');
            if (!btn) return;
            const icon = btn.querySelector('i');
            
            if (isEditing) {
                icon.className = 'fa-solid fa-check';
                btn.style.background = 'var(--success)';
            } else {
                icon.className = 'fa-solid fa-plus';
                btn.style.background = '';
            }
        }

        function renderSocialManager() {
            const list = document.getElementById('social-links-list');
            if (!list) return;
            
            if (!activeSocials || !Array.isArray(activeSocials) || activeSocials.length === 0) {
                list.innerHTML = '<div style="text-align:center; opacity:0.5; padding:10px;">Список соцмереж порожній</div>';
                return;
            }
            list.innerHTML = activeSocials.map((s, index) => `
                <div class="project-item" style="margin-bottom: 8px;">
                    <span style="display:flex; align-items:center; gap:10px;"><i class="${iconMap[s.platform] || 'fa-solid fa-link'}"></i> ${s.platform.toUpperCase()}</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:0.8rem; opacity:0.6; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${s.url}</span>
                        <button class="btn-icon btn-edit" onclick="editSocial(${index})"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn-icon btn-delete" onclick="deleteSocial(${index})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('');
        }

        window.saveFooter = () => {
            const data = {
                logoText: document.getElementById('f-logo').value,
                copyright: document.getElementById('f-copy').value,
                phone: document.getElementById('f-phone').value,
                email: document.getElementById('f-email').value,
                roleUa: document.getElementById('f-role-ua').value,
                roleEn: document.getElementById('f-role-en').value,
                // Гарантуємо, що це завжди масив, навіть якщо він порожній
                socials: activeSocials || []
            };
            set(ref(db, 'settings/global'), data).then(() => alert("Систему оновлено успішно!"));
        };

        onValue(ref(db, 'settings/global'), (snap) => {
            const d = snap.val();
            if(!d) return;
            document.getElementById('f-logo').value = d.logoText || "ANOR";
            document.getElementById('f-copy').value = d.copyright || "© 2026 ANOR CORE SYSTEM";
            document.getElementById('f-phone').value = d.phone || "";
            document.getElementById('f-email').value = d.email || "";
            document.getElementById('f-role-ua').value = d.roleUa || "";
            document.getElementById('f-role-en').value = d.roleEn || "";
            
            // Безпечне отримання масиву
            // Фільтруємо null/undefined, щоб уникнути помилок
            activeSocials = d.socials ? Object.values(d.socials).filter(item => item) : [];
            renderSocialManager();
        });

        window.deleteItem = (path) => {
            if(confirm("Видалити цей елемент з бази Спектраля назавжди?")) remove(ref(db, path));
        };
        
        setLang('ua');
    </script>
</body>
</html>
